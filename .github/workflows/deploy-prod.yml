name: Deploy production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: 246706510miao-svg
  BACKEND_IMAGE: ghcr.io/246706510miao-svg/for-mygirl-backend
  FRONTEND_IMAGE: ghcr.io/246706510miao-svg/for-mygirl-frontend
  THIRD_IMAGE: ghcr.io/246706510miao-svg/for-mygirl-third

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test backend
        working-directory: backend
        run: mvn -q test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: third/requirements.txt

      - name: Test third
        run: |
          python -m pip install --upgrade pip
          pip install -r third/requirements.txt
          python -m unittest discover third/tests

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:main

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:main

      - name: Build and push third
        uses: docker/build-push-action@v6
        with:
          context: .
          file: third/Dockerfile
          push: true
          tags: |
            ${{ env.THIRD_IMAGE }}:${{ github.sha }}
            ${{ env.THIRD_IMAGE }}:main

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Configure SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/prod_deploy_key
          chmod 600 ~/.ssh/prod_deploy_key
          ssh-keyscan -p "${PROD_PORT:-22}" "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Deploy images
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PATH: ${{ secrets.PROD_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN || github.token }}
          APP_VERSION: ${{ github.sha }}
        run: |
          GHCR_READ_TOKEN_B64="$(printf '%s' "$GHCR_READ_TOKEN" | base64 -w 0)"
          ssh -i ~/.ssh/prod_deploy_key -p "${PROD_PORT:-22}" "${PROD_USER}@${PROD_HOST}" \
            "PROD_PATH='${PROD_PATH}' APP_VERSION='${APP_VERSION}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_READ_TOKEN_B64='${GHCR_READ_TOKEN_B64}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$PROD_PATH/shared/prod"
          printf 'APP_VERSION=%s\n' "$APP_VERSION" > version.env
          printf '%s' "$GHCR_READ_TOKEN_B64" | base64 -d | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose --env-file .env.prod --env-file third.env.prod --env-file version.env -f docker-compose.prod.yml pull
          docker compose --env-file .env.prod --env-file third.env.prod --env-file version.env -f docker-compose.prod.yml up -d
          docker compose --env-file .env.prod --env-file third.env.prod --env-file version.env -f docker-compose.prod.yml ps
          REMOTE
