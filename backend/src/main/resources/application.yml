server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: for-mygirl-backend
  datasource:
    url: ${BACKEND_MYSQL_URL:jdbc:mysql://127.0.0.1:3307/for_mygirl_app?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${BACKEND_MYSQL_USERNAME:third_user}
    password: ${BACKEND_MYSQL_PASSWORD:third_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

app:
  cors-origin: ${BACKEND_CORS_ORIGIN:http://localhost:5173}
  user-token: ${BACKEND_USER_TOKEN:dev-user-token}
  admin-token: ${BACKEND_ADMIN_TOKEN:dev-admin-token}
  third-base-url: ${THIRD_BASE_URL:http://127.0.0.1:8001}
  third-poll-times: ${THIRD_POLL_TIMES:12}
  third-poll-interval-ms: ${THIRD_POLL_INTERVAL_MS:500}
