server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: for-mygirl-backend
  datasource:
    url: ${BACKEND_MYSQL_URL:jdbc:mysql://127.0.0.1:3307/for_mygirl_app?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${BACKEND_MYSQL_USERNAME:backend_user}
    password: ${BACKEND_MYSQL_PASSWORD:backend_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

app:
  cors-origin: ${BACKEND_CORS_ORIGIN:http://localhost:*,http://127.0.0.1:*}
  secret-key: ${BACKEND_SECRET_KEY:dev-local-secret-key-change-me}
  admin-initial-password: ${BACKEND_ADMIN_INITIAL_PASSWORD:admin-dev-password}
  legacy-user-login-name: ${BACKEND_LEGACY_USER_LOGIN_NAME:legacy_user}
  legacy-user-initial-password: ${BACKEND_LEGACY_USER_INITIAL_PASSWORD:legacy-user-dev-password}
  legacy-partner-login-name: ${BACKEND_LEGACY_PARTNER_LOGIN_NAME:legacy_partner}
  legacy-partner-initial-password: ${BACKEND_LEGACY_PARTNER_INITIAL_PASSWORD:legacy-partner-dev-password}
  session-ttl-hours: ${BACKEND_SESSION_TTL_HOURS:720}
  third-base-url: ${THIRD_BASE_URL:http://127.0.0.1:8001}
  third-poll-times: ${THIRD_POLL_TIMES:60}
  third-poll-interval-ms: ${THIRD_POLL_INTERVAL_MS:500}
