<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>双向绑定记录 App UI 原型</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-frame" aria-label="双向绑定记录 App 原型">
    <section class="screen login-screen active" data-screen="login">
      <div class="login-card">
        <p class="kicker">For Us</p>
        <h1>登录</h1>
        <p class="subtle">两个账号互相绑定后，可以分别作为对方的用户和管理员。</p>
        <label class="field">
          <span>账号</span>
          <input type="text" value="miao" autocomplete="username" />
        </label>
        <label class="field">
          <span>密码</span>
          <input type="password" value="123456" autocomplete="current-password" />
        </label>
        <label class="field captcha-field">
          <span>验证码</span>
          <div>
            <input type="text" value="4832" />
            <button type="button" class="captcha" data-refresh-captcha>4832</button>
          </div>
        </label>
        <button type="button" class="primary wide" data-go="home">进入应用</button>
      </div>
    </section>

    <section class="screen home-screen" data-screen="home">
      <button type="button" class="avatar-button top-avatar" data-go="profile" aria-label="进入用户界面">
        <img src="data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20120%20120%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20x2%3D%221%22%20y1%3D%220%22%20y2%3D%221%22%3E%3Cstop%20stop-color%3D%22%23ffe3ca%22/%3E%3Cstop%20offset%3D%22.52%22%20stop-color%3D%22%23cddff8%22/%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%23f7c8d0%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width%3D%22120%22%20height%3D%22120%22%20rx%3D%2260%22%20fill%3D%22url%28%23g%29%22/%3E%3Ccircle%20cx%3D%2260%22%20cy%3D%2250%22%20r%3D%2222%22%20fill%3D%22rgba%28255%2C255%2C255%2C.65%29%22/%3E%3Cpath%20d%3D%22M24%20106c6-28%2026-42%2036-42s30%2014%2036%2042%22%20fill%3D%22rgba%28255%2C255%2C255%2C.65%29%22/%3E%3Ctext%20x%3D%2260%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20font-size%3D%2234%22%20font-weight%3D%22800%22%20font-family%3D%22Arial%2C%20sans-serif%22%20fill%3D%22%23171717%22%3E%E6%9D%AA%3C/text%3E%3C/svg%3E" alt="当前用户头像" />
      </button>

      <div class="home-role-pill" aria-live="polite">
        <span data-home-role-text>用户视角</span>
      </div>

      <section class="checkin-widget" aria-label="签到组件">
        <p class="date-line">2026.06.18</p>
        <h2>今天也靠近一点点</h2>
        <button type="button" class="checkin-button" data-checkin>
          <span data-checkin-label>签到</span>
          <b data-home-points>128</b>
        </button>
        <p class="checkin-sentence" data-checkin-sentence>点击签到，给今天加一点确定感。</p>
      </section>

      <nav class="home-dock" aria-label="首页功能入口">
        <button type="button" class="dock-icon" data-dock-left aria-label="对话">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6.8A3.8 3.8 0 0 1 7.8 3h8.4A3.8 3.8 0 0 1 20 6.8v5.9a3.8 3.8 0 0 1-3.8 3.8H10l-4.1 3.1c-.7.5-1.7 0-1.7-.9v-12Z"/></svg>
        </button>
        <button type="button" class="dock-icon" data-dock-right aria-label="最近">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h10a2 2 0 0 1 2 2v14.1c0 1.1-1.2 1.7-2.1 1.1L12 17l-4.9 3.2A1.35 1.35 0 0 1 5 19.1V5a2 2 0 0 1 2-2Zm2 5h6M9 11h6M9 14h4"/></svg>
        </button>
      </nav>
    </section>

    <section class="screen overlay-screen" data-screen="profile">
      <div class="glass-layer">
        <header class="role-header">
          <span></span>
          <button type="button" class="identity-switch" data-switch-role aria-label="切换用户或管理员角色">
            <img src="data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20120%20120%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20x2%3D%221%22%20y1%3D%220%22%20y2%3D%221%22%3E%3Cstop%20stop-color%3D%22%23ffe3ca%22/%3E%3Cstop%20offset%3D%22.52%22%20stop-color%3D%22%23cddff8%22/%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%23f7c8d0%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width%3D%22120%22%20height%3D%22120%22%20rx%3D%2260%22%20fill%3D%22url%28%23g%29%22/%3E%3Ccircle%20cx%3D%2260%22%20cy%3D%2250%22%20r%3D%2222%22%20fill%3D%22rgba%28255%2C255%2C255%2C.65%29%22/%3E%3Cpath%20d%3D%22M24%20106c6-28%2026-42%2036-42s30%2014%2036%2042%22%20fill%3D%22rgba%28255%2C255%2C255%2C.65%29%22/%3E%3Ctext%20x%3D%2260%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20font-size%3D%2234%22%20font-weight%3D%22800%22%20font-family%3D%22Arial%2C%20sans-serif%22%20fill%3D%22%23171717%22%3E%E6%9D%AA%3C/text%3E%3C/svg%3E" alt="角色头像" />
            <span>
              <b data-profile-name>杪</b>
              <em data-profile-role>用户视角 · 点击切换</em>
            </span>
          </button>
          <button type="button" class="round-control" data-go="home" aria-label="返回首页">×</button>
        </header>

        <section class="profile-center">
          <div class="points-orb">
            <span data-profile-points-label>我的积分</span>
            <b data-profile-points>128</b>
          </div>
          <div class="reward-panel">
            <div class="panel-title-row">
              <h2 data-reward-title>可兑换奖品</h2>
              <span data-bound-label>绑定管理员：TA</span>
            </div>
            <div class="reward-list" data-reward-list></div>
          </div>
        </section>
      </div>
    </section>

    <section class="screen overlay-screen" data-screen="chat">
      <div class="glass-layer chat-layout">
        <header class="page-head">
          <button type="button" class="round-control" data-go="home" aria-label="返回首页">‹</button>
          <div>
            <p class="kicker">记录对话</p>
            <h1>和 AI 说今天</h1>
          </div>
          <button type="button" class="round-control" data-go="userRecent" aria-label="查看最近">⌕</button>
        </header>

        <section class="chat-history" aria-label="历史记录">
          <article class="message ai">可以直接说今天发生了什么，我会整理成记录草稿。</article>
          <article class="message me">今天上午效率不错，下午有点累，但还是把计划完成了。</article>
          <article class="message ai">我会保留你的原意，也会把内容整理得更适合写入记录。</article>
        </section>

        <form class="composer" data-chat-form>
          <button type="button" class="voice-button" aria-label="录音输入">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Zm6-3a6 6 0 0 1-12 0M12 17v4m-4 0h8"/></svg>
          </button>
          <input type="text" placeholder="输入或按住录音记录今天" />
          <button type="submit" class="send-button" aria-label="发送">↑</button>
        </form>
      </div>
    </section>

    <section class="screen overlay-screen" data-screen="userRecent">
      <div class="glass-layer">
        <header class="page-head">
          <button type="button" class="round-control" data-go="home" aria-label="返回首页">‹</button>
          <div>
            <p class="kicker">用户视角</p>
            <h1>我的最近记录</h1>
          </div>
          <span></span>
        </header>

        <section class="field-picker" aria-label="字段选择">
          <label><span>字段一</span><select data-field-select="0"><option value="date" selected>日期</option><option value="content">内容</option><option value="score">打分</option><option value="status">状态</option></select></label>
          <label><span>字段二</span><select data-field-select="1"><option value="date">日期</option><option value="content" selected>内容</option><option value="score">打分</option><option value="status">状态</option></select></label>
          <label><span>字段三</span><select data-field-select="2"><option value="date">日期</option><option value="content">内容</option><option value="score" selected>打分</option><option value="status">状态</option></select></label>
        </section>

        <section class="recent-list" data-user-recent-list aria-label="最近记录列表"></section>
      </div>
    </section>

    <section class="screen overlay-screen" data-screen="adminRewards">
      <div class="glass-layer">
        <header class="page-head">
          <button type="button" class="round-control" data-go="home" aria-label="返回首页">‹</button>
          <div>
            <p class="kicker">管理员视角</p>
            <h1>积分奖品</h1>
          </div>
          <button type="button" class="round-control" data-go="profile" aria-label="角色信息">◎</button>
        </header>

        <section class="admin-reward-hero">
          <p>给绑定用户添加可兑换奖品</p>
          <b data-admin-user-points>128 分</b>
        </section>

        <form class="reward-form" data-reward-form>
          <label class="field">
            <span>奖品名称</span>
            <input name="reward" type="text" placeholder="比如：一起看电影 / 奶茶一次 / 周末小礼物" />
          </label>
          <label class="field">
            <span>所需积分</span>
            <input name="cost" type="number" placeholder="80" />
          </label>
          <button type="submit" class="primary wide">添加奖品</button>
        </form>

        <section class="reward-list admin-list" data-admin-reward-list></section>
      </div>
    </section>

    <section class="screen overlay-screen" data-screen="adminRecent">
      <div class="glass-layer">
        <header class="page-head">
          <button type="button" class="round-control" data-go="home" aria-label="返回首页">‹</button>
          <div>
            <p class="kicker">管理员视角</p>
            <h1>绑定用户最近记录</h1>
          </div>
          <span></span>
        </header>

        <section class="admin-record-list" data-admin-record-list aria-label="管理员最近记录"></section>
      </div>
    </section>

    <div class="toast" data-toast role="status" aria-live="polite"></div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
