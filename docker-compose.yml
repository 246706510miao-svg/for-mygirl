name: for-mygirl-third

x-third-common: &third-common
  build:
    context: .
    dockerfile: third/Dockerfile
  env_file:
    - ${THIRD_ENV_FILE:-./third/.env}
  environment:
    PYTHONPATH: /app
    THIRD_MYSQL_DSN: mysql+pymysql://third_user:third_password@mysql:3306/third_service
    THIRD_TEST_MYSQL_DSN: mysql+pymysql://third_user:third_password@mysql:3306/third_test
    THIRD_REDIS_URL: redis://redis:6379/0
  depends_on:
    mysql:
      condition: service_healthy
    mysql-init:
      condition: service_completed_successfully
    redis:
      condition: service_healthy

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: third_service
      MYSQL_USER: third_user
      MYSQL_PASSWORD: third_password
      MYSQL_ROOT_PASSWORD: third_root_password
    ports:
      - "${THIRD_MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - third_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  mysql-init:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: third_root_password
    depends_on:
      mysql:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "mysql -h mysql -uroot -p$${MYSQL_ROOT_PASSWORD} -e \"CREATE DATABASE IF NOT EXISTS third_service CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE DATABASE IF NOT EXISTS third_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE DATABASE IF NOT EXISTS for_mygirl_app CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE USER IF NOT EXISTS 'third_user'@'%' IDENTIFIED BY 'third_password'; CREATE USER IF NOT EXISTS 'backend_user'@'%' IDENTIFIED BY 'backend_password'; REVOKE ALL PRIVILEGES, GRANT OPTION FROM 'third_user'@'%'; REVOKE ALL PRIVILEGES, GRANT OPTION FROM 'backend_user'@'%'; GRANT ALL PRIVILEGES ON third_service.* TO 'third_user'@'%'; GRANT ALL PRIVILEGES ON third_test.* TO 'third_user'@'%'; GRANT ALL PRIVILEGES ON for_mygirl_app.* TO 'backend_user'@'%'; FLUSH PRIVILEGES;\"",
      ]
    restart: "no"

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${THIRD_REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - third_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  third-migration:
    <<: *third-common
    working_dir: /app/third
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  third-two-api:
    <<: *third-common
    command: ["uvicorn", "third_two.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${THIRD_API_HOST_PORT:-8001}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      mysql-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      third-migration:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  third-prompt-seed:
    <<: *third-common
    profiles: ["third-legacy"]
    command: ["python", "-m", "third.scripts.seed_runagent_prompts"]
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
      mysql-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      third-migration:
        condition: service_completed_successfully

  third-api:
    <<: *third-common
    profiles: ["third-legacy"]
    command: ["uvicorn", "third.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${THIRD_LEGACY_API_HOST_PORT:-8002}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      mysql-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      third-prompt-seed:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  third-worker:
    <<: *third-common
    profiles: ["third-legacy"]
    command: ["python", "-m", "third.worker"]
    depends_on:
      mysql:
        condition: service_healthy
      mysql-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      third-prompt-seed:
        condition: service_completed_successfully

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles: ["app"]
    environment:
      BACKEND_MYSQL_URL: jdbc:mysql://mysql:3306/for_mygirl_app?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      BACKEND_MYSQL_USERNAME: backend_user
      BACKEND_MYSQL_PASSWORD: backend_password
      THIRD_BASE_URL: http://third-two-api:8000
      BACKEND_CORS_ORIGIN: http://localhost:*,http://127.0.0.1:*,http://10.*:*,http://172.*:*,http://192.168.*:*
      BACKEND_ADMIN_INITIAL_PASSWORD: admin-dev-password
      BACKEND_LEGACY_USER_LOGIN_NAME: legacy_user
      BACKEND_LEGACY_USER_INITIAL_PASSWORD: legacy-user-dev-password
      BACKEND_LEGACY_PARTNER_LOGIN_NAME: legacy_partner
      BACKEND_LEGACY_PARTNER_INITIAL_PASSWORD: legacy-partner-dev-password
      BACKEND_AUTH_COOKIE_NAME: FOR_MYGIRL_SESSION
      BACKEND_AUTH_COOKIE_SECURE: "false"
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      mysql-init:
        condition: service_completed_successfully
      third-two-api:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-}
    profiles: ["app"]
    expose:
      - "5173"
    depends_on:
      - backend

  local-caddy:
    image: caddy:2.8-alpine
    profiles: ["app"]
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    volumes:
      - ./deploy/local/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

volumes:
  third_mysql_data:
  third_redis_data:
