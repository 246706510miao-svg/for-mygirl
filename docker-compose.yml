name: for-mygirl-third

x-third-common: &third-common
  build:
    context: .
    dockerfile: third/Dockerfile
  env_file:
    - ${THIRD_ENV_FILE:-./third/.env.docker.mock}
  environment:
    PYTHONPATH: /app
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: third_service
      MYSQL_USER: third_user
      MYSQL_PASSWORD: third_password
      MYSQL_ROOT_PASSWORD: third_root_password
    ports:
      - "${THIRD_MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - third_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${THIRD_REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - third_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  third-migration:
    <<: *third-common
    profiles: ["third-container"]
    working_dir: /app/third
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  third-api:
    <<: *third-common
    profiles: ["third-container"]
    command: ["uvicorn", "third.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${THIRD_API_HOST_PORT:-8001}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      third-migration:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  third-worker:
    <<: *third-common
    profiles: ["third-container"]
    command: ["python", "-m", "third.worker"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      third-migration:
        condition: service_completed_successfully

volumes:
  third_mysql_data:
  third_redis_data:
